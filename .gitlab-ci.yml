# ============================================================================
# APPIN - GitLab CI/CD
# Transposition du workflow GitHub Actions "R Tests" vers GitLab CI.
# ============================================================================
stages:
  - test

variables:
  # Aligne avec le Posit Package Manager -> binaires precompiles (jammy/22.04)
  R_KEEP_PKG_SOURCE: "yes"
  CI: "true"
  # Les tests CNN doivent skipper : keras/tensorflow non installes,
  # reticulate neutralise.
  RETICULATE_PYTHON: ""
  # Evite les invites interactives lors de l'install des paquets systeme
  DEBIAN_FRONTEND: "noninteractive"

R-tests:
  stage: test
  # Image R officielle basee sur Ubuntu 22.04 (jammy).
  # rocker/r-ver:4.2.2 = R fixe ; "release" via setup-r n'existe pas hors Actions,
  # donc on epingle une version concrete proche de ton environnement.
  image: rocker/r-ver:4.2.2
  # Equivaut au "on: push/pull_request sur main/master" + workflow_dispatch.
  # workflow_dispatch -> lancement manuel via le bouton "Run pipeline".
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(main|master)$/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(main|master)$/'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  before_script:
    # Dependances systeme (identiques au workflow GitHub).
    - apt-get update
    - >
      apt-get install -y
      make pandoc git
      libx11-dev libcurl4-openssl-dev libssl-dev libxml2-dev
      zlib1g-dev libglpk-dev libgmp-dev libicu-dev libfftw3-dev
      libjpeg-dev libpng-dev libtiff-dev
      libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev
      libuv1
    # Utilise les binaires precompiles du Posit Package Manager (jammy).
    - >
      Rscript -e 'options(repos = c(PPM = "https://packagemanager.posit.co/cran/__linux__/jammy/latest"));
      install.packages(c(
      "testthat","shiny","shinyFiles","shinyjs","shinyBS","shinycssloaders",
      "shinydashboard","shinydashboardPlus","bslib","bsicons","htmltools",
      "DT","plotly","ggplot2","viridis","data.table","dplyr","purrr",
      "magrittr","readr","reshape2","dbscan","zoo","abind","matrixStats",
      "minpack.lm","imager","sp","digest","Rcpp","MASS"))'
  script:
    # Le code testable est dans APPIN/APPIN_1.0.0/ (APPIN_1.0.0 est un
    # sous-dossier de APPIN, a la racine du depot a cote de MetCAP-R/).
    - cd APPIN/APPIN_1.0.0
    - Rscript -e 'testthat::test_dir("tests/testthat", stop_on_failure = TRUE)'
